<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSORY ARCHIVE: THE INTERACTIVE FOG</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #111; --accent: #c5a47e; --serif: 'Cormorant Garamond', serif; --sans: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; scroll-behavior: smooth; }

        /* 커서 */
        .cursor { width: 8px; height: 8px; background: #000; border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; }
        .cursor-follower { width: 30px; height: 30px; border: 1px solid rgba(0,0,0,0.2); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s; }
        .hidden { display: none !important; }

        /* [1. INTRO: 강화된 안개] */
        #intro { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding-left: 10%; background: #ffffff; position: relative; overflow: hidden; }
        
        /* [수정] 블러를 낮추고 불투명도를 높여 안개를 더 선명하게 만듦 */
        #fog-canvas { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
            filter: blur(25px); /* 블러를 줄여 입자감을 살림 */
            opacity: 0.9; /* 안개를 더 진하게 */
        }
        
        .main-title { font-family: var(--serif); font-size: 10vw; line-height: 0.85; font-weight: 300; text-transform: uppercase; z-index: 2; position: relative; }
        .start-trigger { margin-top: 50px; font-family: var(--serif); font-size: 1.8rem; font-style: italic; text-decoration: underline; color: #555; cursor: pointer; transition: 0.4s; z-index: 2; position: relative; }

        /* [2. TEST] */
        #test { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; padding: 0 10%; position: relative; z-index: 5; }
        .test-content { width: 100%; max-width: 800px; text-align: center; }
        .q-tag { color: var(--accent); font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 20px; }
        .q-text { font-family: var(--serif); font-size: 3.2rem; line-height: 1.2; margin-bottom: 60px; font-style: italic; font-weight: 300; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .opt-btn { padding: 25px; background: transparent; border: 1px solid #ddd; font-size: 1rem; transition: 0.3s; cursor: pointer; color: #666; }
        .opt-btn:hover { border-color: #111; color: #111; background: #fff; transform: translateY(-3px); }

        /* [3. LOADING] */
        #loader { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .load-line { width: 200px; height: 1px; background: #eee; overflow: hidden; position: relative; margin-top: 20px; }
        .load-line::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #111; animation: l 2s infinite; }
        @keyframes l { to { left: 100%; } }

        /* [4. RESULT PAGE] */
        #result-page { display: none; background: #ffffff; padding-bottom: 150px; }
        .res-header { height: 100vh; display: flex; align-items: center; padding: 0 8%; position: relative; }
        .res-hero-img { width: 40%; height: 70vh; background: #eee; overflow: hidden; }
        .res-hero-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .res-info-box { width: 50%; padding-left: 8%; }
        .res-title { font-family: var(--serif); font-size: 8rem; line-height: 1; border-bottom: 10px solid #111; display: inline-block; margin-bottom: 30px; text-transform: uppercase; }
        
        .spec-container { padding: 0 8%; margin-top: -50px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 80px; }
        .spec-section { border-top: 1px solid #111; padding-top: 30px; }
        .spec-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; display: block; }
        
        .perfume-list { list-style: none; }
        .perfume-list li { font-family: var(--serif); font-size: 2.2rem; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .fact-box { background: #f9f9f9; padding: 40px; position: relative; }
        .fact-text { font-family: var(--serif); font-size: 1.5rem; line-height: 1.6; font-style: italic; color: #333; }
        .fact-icon { font-size: 0.7rem; color: var(--accent); margin-bottom: 15px; display: block; letter-spacing: 2px; }

        /* [5. ARCHIVE] */
        #archive-browser { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 3000; display: none; flex-direction: column; padding: 5% 8%; backdrop-filter: blur(10px); }
        .archive-track { display: flex; gap: 30px; overflow-x: auto; padding: 40px 0; scrollbar-width: none; }
        .archive-card { min-width: 250px; height: 350px; border: 1px solid #eee; cursor: pointer; text-align: center; flex-shrink: 0; transition: 0.4s; background: #fff; }
        .archive-card:hover { border-color: #111; transform: translateY(-10px); }
        .archive-card img { width: 100%; height: 80%; object-fit: cover; }
        .archive-card h4 { font-family: var(--serif); font-size: 1.2rem; margin-top: 15px; text-transform: uppercase; }

        .float-nav { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; gap: 15px; }
        .nav-btn { font-size: 0.7rem; border: 1px solid rgba(0,0,0,0.1); padding: 12px 30px; border-radius: 40px; background: #fff; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .nav-btn:hover { background: #111; color: #fff; }
    </style>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <section id="intro">
        <canvas id="fog-canvas"></canvas>
        <h1 class="main-title">Sensory<br>Archive.</h1>
        <div class="start-trigger" onclick="startTest()">Discover your essence →</div>
    </section>

    <section id="test" class="hidden">
        <div class="test-content">
            <p id="progress" class="q-tag"></p>
            <h2 id="question" class="q-text"></h2>
            <div id="options" class="options-grid"></div>
        </div>
    </section>

    <div id="loader" class="hidden">
        <p style="letter-spacing: 8px;">ARCHIVING SENSES...</p>
        <div class="load-line"></div>
    </div>

    <section id="result-page">
        <div class="res-header">
            <div class="res-hero-img"><img id="res-hero-img" src=""></div>
            <div class="res-info-box">
                <h2 id="res-title" class="res-title"></h2>
                <p id="res-quote" style="font-family: var(--serif); font-size: 2.2rem; color: #666; font-style: italic;"></p>
            </div>
        </div>
        
        <div class="spec-container">
            <div class="spec-section">
                <span class="spec-label">Recommended Fragrance</span>
                <ul id="res-perfumes" class="perfume-list"></ul>
            </div>
            <div class="spec-section">
                <span class="spec-label">Archive Insights</span>
                <div class="fact-box">
                    <span class="fact-icon">ODD FACT //</span>
                    <p id="res-fact" class="fact-text"></p>
                </div>
            </div>
        </div>

        <div class="float-nav">
            <div class="nav-btn" onclick="openArchive()">VIEW ALL ARCHIVE</div>
            <div class="nav-btn" onclick="location.reload()">RE-TEST</div>
        </div>
    </section>

    <div id="archive-browser">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <h2 style="font-family:var(--serif); font-size: 2rem;">THE ARCHIVE</h2>
            <span style="cursor:pointer; letter-spacing: 2px;" onclick="closeArchive()">CLOSE EXIT —</span>
        </div>
        <div id="archive-track" class="archive-track"></div>
    </div>

    <script>
        // --- 커서 로직 ---
        const cur = document.querySelector('.cursor'), fol = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', e=>{ 
            cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; 
            setTimeout(()=>{fol.style.left=e.clientX-11+'px'; fol.style.top=e.clientY-11+'px';},50); 
        });
        
        // --- [수정] 강화된 마우스 안개 인터랙션 로직 ---
        let mouseX = -1000, mouseY = -1000;
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        // 입자 수를 줄이고 크기를 키워 움직임을 더 잘 보이게 함
        let numParticles = 18; 

        function resize() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            particles = Array(numParticles).fill().map(()=>new Particle()); 
        }
        window.addEventListener('resize', resize);

        function Particle() {
            this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
            this.vx = (Math.random()-0.5)*0.3; // 기본 흐름은 아주 느리게
            this.vy = (Math.random()-0.5)*0.3;
            this.radius = Math.random()*350+250; // 거대한 구름 크기
            const c = ['rgba(255,200,210,0.8)','rgba(180,220,240,0.8)','rgba(220,180,240,0.8)','rgba(255,250,220,0.8)'];
            this.color = c[Math.floor(Math.random()*c.length)];
        }

        Particle.prototype.update = function() {
            // 마우스 상호작용 계산
            let dx = this.x - mouseX;
            let dy = this.y - mouseY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // [수정] 영향 범위를 넓히고 밀어내는 힘을 대폭 강화
            let influenceRadius = 350; 
            if(distance < influenceRadius) {
                let force = (influenceRadius - distance) / influenceRadius;
                // 밀어내는 속도를 35로 상향 (기존 20에서 대폭 강화)
                this.x += (dx / distance) * force * 35; 
                this.y += (dy / distance) * force * 35;
            }

            // 기본 느린 이동
            this.x += this.vx; this.y += this.vy;

            // 화면 이탈 방지
            if(this.x<-this.radius) this.x=canvas.width+this.radius; if(this.x>canvas.width+this.radius) this.x=-this.radius;
            if(this.y<-this.radius) this.y=canvas.height+this.radius; if(this.y>canvas.height+this.radius) this.y=-this.radius;
        }

        Particle.prototype.draw = function() {
            ctx.beginPath();
            let g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius);
            g.addColorStop(0,this.color); 
            // [수정] 마우스 주변 안개 입자를 더 투명하게 만들어 갈라지는 느낌 강화
            let dx = this.x - mouseX, dy = this.y - mouseY, dist = Math.sqrt(dx*dx+dy*dy);
            let edgeOpacity = (dist < 300) ? 0 : 1; // 마우스 근처 300px 이내는 가장자리를 투명하게
            g.addColorStop(edgeOpacity, 'rgba(255,255,255,0)');
            
            ctx.fillStyle=g; ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fill();
        }

        function anim() {
            // [수정] 매 프레임 흰색 배경으로 초기화하여 잔상을 없애고 움직임을 깔끔하게 보여줌
            ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height); 
            particles.forEach(p=>{p.update();p.draw();}); 
            requestAnimationFrame(anim); 
        }
        resize(); anim();

        // --- 테스트 데이터 ---
        const questions = [
            { q: "공간에서 느껴지는 공기의 습도는?", a: [{t:"건조하고 쾌적한", v:"woody"}, {t:"촉촉한 정원", v:"floral"}, {t:"안개 낀 고요함", v:"chypre"}, {t:"시원한 파도", v:"citrus"}] },
            { q: "공간을 채울 음악의 선율은?", a: [{t:"우아한 클래식", v:"floral"}, {t:"경쾌한 시티팝", v:"citrus"}, {t:"로파이 재즈", v:"musk"}, {t:"어쿠스틱 팝", v:"fruity"}] },
            { q: "손끝에 닿는 소재의 질감은?", a: [{t:"단단한 통원목", v:"woody"}, {t:"부드러운 실크", v:"floral"}, {t:"바스락거리는 린넨", v:"musk"}, {t:"톡톡 튀는 니트", v:"fruity"}] },
            { q: "당신을 깨우는 아침 햇살은?", a: [{t:"강렬한 빛의 줄기", v:"citrus"}, {t:"부드러운 금빛", v:"fruity"}, {t:"차분한 새벽녘 푸른빛", v:"woody"}, {t:"은은한 구름 사이 빛", v:"floral"}] },
            { q: "선호하는 휴식의 형태는?", a: [{t:"낯선 거리 탐색", v:"citrus"}, {t:"숲속에서의 명상", v:"woody"}, {t:"포근한 낮잠", v:"musk"}, {t:"미술관 관람", v:"chypre"}] },
            { q: "방안에 두고 싶은 가구는?", a: [{t:"화려한 벨벳 소파", v:"floral"}, {t:"투명한 유리 테이블", v:"citrus"}, {t:"묵직한 원목 책상", v:"woody"}, {t:"포근한 1인용 체어", v:"musk"}] },
            { q: "마음을 끄는 풍경은?", a: [{t:"만개한 꽃밭", v:"floral"}, {t:"끝없는 지평선", v:"woody"}, {t:"파스텔톤 노을", v:"fruity"}, {t:"대리석 건축물", v:"chypre"}] },
            { q: "지금 가장 필요한 에너지는?", a: [{t:"기분 좋은 활력", v:"citrus"}, {t:"깊고 고요한 평온", v:"woody"}, {t:"따뜻한 위로", v:"musk"}, {t:"세련된 영감", v:"chypre"}] }
        ];

        const archiveData = {
            floral: { name:"Floral", quote:"A Blooming Narrative", perfumes: ["Dior - J'adore", "Gucci - Bloom", "Diptyque - Eau Rose"], fact: "장미 향수 1ml를 추출하기 위해 약 3,000송이의 장미가 필요하다는 사실을 아시나요?", hero: "floral.jpg" },
            citrus: { name:"Citrus", quote:"The Vitality of Air", perfumes: ["AdP - Mirto", "Jo Malone - Lime Basil", "Atelier Cologne - Pomelo"], fact: "시트러스 계열의 향은 뇌의 주의력을 높여 업무 효율을 10% 이상 향상시킨다는 연구 결과가 있습니다.", hero: "citrus.jpg" },
            woody: { name:"Woody", quote:"Solitude in the Forest", perfumes: ["Le Labo - Santal 33", "Aesop - Hwyl", "Diptyque - Tam Dao"], fact: "우디 향의 주원료인 '샌달우드'는 나무가 향을 내기 위해 최소 30년 이상 자라야 채취가 가능합니다.", hero: "woody.jpg" },
            musk: { name:"Musk", quote:"Warmth on the Skin", perfumes: ["Byredo - Blanche", "Kiehl's - Musk", "Diptyque - Fleur de Peau"], fact: "인간은 본능적으로 머스크 향에서 어머니의 살결 같은 평온함을 느끼도록 설계되어 있습니다.", hero: "musk.jpg" },
            fruity: { name:"Fruity", quote:"A Rhythmic Sweetness", perfumes: ["Jo Malone - Pear & Freesia", "Gucci - Flora", "Byredo - Pulp"], fact: "후각은 미각의 80%를 결정합니다. 프루티 향을 맡는 것만으로도 당신의 뇌는 단맛을 느낄 준비를 합니다.", hero: "fruity.jpg" },
            chypre: { name:"Chypre", quote:"Sophisticated Depth", perfumes: ["Chanel - Mademoiselle", "Sisley - Eau du Soir", "Kilian - Moonlight"], fact: "시프레(Chypre)는 지중해의 키프로스 섬을 뜻하며, 대지와 숲의 향이 결합된 가장 지적인 계열로 꼽힙니다.", hero: "chypre.jpg" }
        };

        // --- 로직 (테스트 시작, 질문 노출, 결과 렌더링) ---
        let curQ = 0, scores = { floral:0, citrus:0, woody:0, musk:0, fruity:0, chypre:0 };

        function startTest() { document.getElementById('intro').classList.add('hidden'); document.getElementById('test').classList.remove('hidden'); showQ(); }
        function showQ() {
            const q = questions[curQ]; 
            document.getElementById('progress').innerText = `STEP 0${curQ + 1}/08`;
            document.getElementById('question').innerText = q.q;
            const opt = document.getElementById('options'); opt.innerHTML = '';
            q.a.forEach(item => {
                const b = document.createElement('button'); b.className='opt-btn'; b.innerText=item.t;
                b.onclick = () => { scores[item.v]++; curQ++; if(curQ<questions.length) showQ(); else end(); };
                opt.appendChild(b);
            });
        }
        function end() {
            document.getElementById('test').classList.add('hidden'); document.getElementById('loader').classList.remove('hidden');
            const winner = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);
            setTimeout(() => { 
                render(winner); document.getElementById('loader').classList.add('hidden'); 
                document.getElementById('result-page').style.display='block'; window.scrollTo(0,0);
            }, 2500);
        }
        function render(key) {
            const d = archiveData[key];
            document.getElementById('res-title').innerText = d.name;
            document.getElementById('res-quote').innerText = d.quote;
            document.getElementById('res-fact').innerText = d.fact;
            document.getElementById('res-hero-img').src = d.hero;
            document.getElementById('res-perfumes').innerHTML = d.perfumes.map(p=>`<li>${p}</li>`).join('');
        }

        function openArchive() {
            const track = document.getElementById('archive-track'); track.innerHTML = '';
            Object.keys(archiveData).forEach(key => {
                const d = archiveData[key];
                const card = document.createElement('div'); card.className = 'archive-card';
                card.innerHTML = `<img src="${d.hero}"><h4>${d.name}</h4>`;
                card.onclick = () => { render(key); closeArchive(); window.scrollTo(0,0); };
                track.appendChild(card);
            });
            document.getElementById('archive-browser').style.display = 'flex';
        }
        function closeArchive() { document.getElementById('archive-browser').style.display = 'none'; }
    </script>
</body>
</html>
